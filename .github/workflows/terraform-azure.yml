# Terraform runs only in GitHub Actions — do not run terraform locally.
# Local workflow: edit .tf files → git commit → git push → PR (plan) or workflow_dispatch (plan/apply).

name: Terraform (Azure)

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-azure.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'plan = preview only; apply = writes to Azure (main branch only)'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-azure-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: 'false'
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_admin_username: ${{ secrets.TF_VAR_admin_username }}
  TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
  TF_VAR_admin_source_ip_cidr: ${{ secrets.TF_VAR_admin_source_ip_cidr }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Fork PRs have no Azure/GitHub secrets — skip (same-repo PRs only).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v6

      - name: Check Azure remote-state variables
        run: |
          test -n "${{ vars.TF_STATE_RG }}" || { echo "Set repo Variable TF_STATE_RG"; exit 1; }
          test -n "${{ vars.TF_STATE_SA }}" || { echo "Set repo Variable TF_STATE_SA"; exit 1; }
          test -n "${{ vars.TF_STATE_CONTAINER }}" || { echo "Set repo Variable TF_STATE_CONTAINER"; exit 1; }
          test -n "${{ vars.TF_STATE_KEY }}" || { echo "Set repo Variable TF_STATE_KEY"; exit 1; }

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'
          terraform_wrapper: false

      - name: Terraform fmt (check)
        working-directory: deploy/terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: deploy/terraform
        run: |
          terraform init \
            -backend-config=resource_group_name=${{ vars.TF_STATE_RG }} \
            -backend-config=storage_account_name=${{ vars.TF_STATE_SA }} \
            -backend-config=container_name=${{ vars.TF_STATE_CONTAINER }} \
            -backend-config=key=${{ vars.TF_STATE_KEY }}

      - name: Terraform validate
        working-directory: deploy/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: deploy/terraform
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'apply' &&
          github.ref == 'refs/heads/main'
        working-directory: deploy/terraform
        run: terraform apply -auto-approve -no-color tfplan
