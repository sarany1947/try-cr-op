# ============================================================================
# TERRAFORM MUST NOT RUN ON DEVELOPER LAPTOPS — ONLY THIS WORKFLOW MAY RUN IT.
# Locally: git edit + push. Never: terraform init/plan/apply on your machine.
# ============================================================================
# Single repo secret: CAREER_OPS_AZURE (JSON — deploy/terraform/azure-secret.example.json)

name: Terraform (Azure)

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-azure.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'plan = preview; apply = writes Azure (main only)'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

concurrency:
  group: terraform-azure-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: 'false'

jobs:
  terraform:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - uses: actions/checkout@v6

      - name: Load CAREER_OPS_AZURE (one JSON secret)
        env:
          RAW: ${{ secrets.CAREER_OPS_AZURE }}
        run: |
          set -euo pipefail
          if [ -z "${RAW:-}" ]; then
            echo "::error::Create ONE repo secret named CAREER_OPS_AZURE (paste JSON from deploy/terraform/azure-secret.example.json — see deploy/terraform/README.md)."
            exit 1
          fi
          printf '%s' "$RAW" > /tmp/az.json
          jq empty /tmp/az.json

          {
            echo "ARM_CLIENT_ID=$(jq -r .clientId /tmp/az.json)"
            echo "ARM_SUBSCRIPTION_ID=$(jq -r .subscriptionId /tmp/az.json)"
            echo "ARM_TENANT_ID=$(jq -r .tenantId /tmp/az.json)"
            echo "TF_BACKEND_RG=$(jq -r .state.resourceGroup /tmp/az.json)"
            echo "TF_BACKEND_SA=$(jq -r .state.storageAccount /tmp/az.json)"
            echo "TF_BACKEND_CONTAINER=$(jq -r .state.container /tmp/az.json)"
            echo "TF_BACKEND_KEY=$(jq -r .state.key /tmp/az.json)"
            echo "TF_VAR_admin_username=$(jq -r .windowsVm.adminUsername /tmp/az.json)"
            echo "TF_VAR_admin_source_ip_cidr=$(jq -r .windowsVm.rdpSourceCidr /tmp/az.json)"
          } >> "$GITHUB_ENV"

          echo "ARM_CLIENT_SECRET<<DELIM_CS" >> "$GITHUB_ENV"
          jq -r .clientSecret /tmp/az.json >> "$GITHUB_ENV"
          echo "DELIM_CS" >> "$GITHUB_ENV"

          echo "TF_VAR_admin_password<<DELIM_PW" >> "$GITHUB_ENV"
          jq -r .windowsVm.adminPassword /tmp/az.json >> "$GITHUB_ENV"
          echo "DELIM_PW" >> "$GITHUB_ENV"

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          client-secret: ${{ env.ARM_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'
          terraform_wrapper: false

      - name: Terraform fmt (check)
        working-directory: deploy/terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: deploy/terraform
        run: |
          terraform init \
            -backend-config=resource_group_name="${TF_BACKEND_RG}" \
            -backend-config=storage_account_name="${TF_BACKEND_SA}" \
            -backend-config=container_name="${TF_BACKEND_CONTAINER}" \
            -backend-config=key="${TF_BACKEND_KEY}"

      - name: Terraform validate
        working-directory: deploy/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: deploy/terraform
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'apply' &&
          github.ref == 'refs/heads/main'
        working-directory: deploy/terraform
        run: terraform apply -auto-approve -no-color tfplan
